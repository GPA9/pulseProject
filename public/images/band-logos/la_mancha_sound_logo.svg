  <line x1="80" y1="90" x2="270" y2="90" stroke-width="0.7" style="fill:none;stroke:rgb(232, 226, 218);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="374" y1="90" x2="600" y2="90" stroke-width="0.7" style="fill:none;stroke:rgb(232, 226, 218);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <circle cx="322" cy="90" r="3" style="fill:rgb(212, 80, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- LA — pequeño, elegante, en rojo -->
  <text x="160" y="178" font-family="'Garamond','Georgia','Times New Roman',serif" font-size="28" font-weight="400" letter-spacing="10" text-anchor="middle" style="fill:rgb(212, 80, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Garamond, Georgia, serif;font-size:28px;font-weight:400;text-anchor:middle;dominant-baseline:auto">LA</text>

  <!-- Línea roja bajo LA -->
  <line x1="128" y1="184" x2="194" y2="184" stroke-width="1.2" mask="url(#imagine-text-gaps-j6eros)" style="fill:none;stroke:rgb(212, 80, 42);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

