  <text x="340" y="412" font-family="'Garamond','Georgia','Times New Roman',serif" font-size="24" font-weight="400" letter-spacing="22" text-anchor="middle" style="fill:rgb(232, 226, 218);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Garamond, Georgia, serif;font-size:24px;font-weight:400;text-anchor:middle;dominant-baseline:auto">SOUND</text>

