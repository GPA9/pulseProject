  <line x1="80" y1="375" x2="600" y2="375" stroke-width="1" mask="url(#imagine-text-gaps-j6eros)" style="fill:none;stroke:rgb(232, 226, 218);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="80" y1="379" x2="600" y2="379" stroke-width="0.4" mask="url(#imagine-text-gaps-j6eros)" style="fill:none;stroke:rgb(212, 80, 42);color:rgb(255, 255, 255);stroke-width:0.4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

