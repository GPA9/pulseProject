<svg width="100%" viewBox="0 0 690 450" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">La Mancha Sound</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo sofisticado y profesional para el grupo La Mancha Sound</desc>

  <defs>
    
  <mask id="imagine-text-gaps-j6eros" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="690" height="450" fill="white"/><rect x="127.69999694824219" y="152" width="63.79999923706055" height="35.20000076293945" fill="black" rx="2"/><rect x="130.75625610351562" y="283.6000061035156" width="418.4875183105469" height="100.80000305175781" fill="black" rx="2"/><rect x="238.86875915527344" y="389.20001220703125" width="202.2624969482422" height="31.200000762939453" fill="black" rx="2"/></mask></defs>

  <rect width="680" height="440" style="fill:rgb(20, 18, 16);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Llanura / horizonte de La Mancha -->
  <rect x="40" y="310" width="600" height="1" stroke-width="0.7" opacity="0.4" style="fill:none;stroke:rgb(232, 226, 218);color:rgb(255, 255, 255);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Molino de viento estilizado — icono geométrico -->
  <!-- Torre -->
